steps:
  - name: Checkout source
    uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4

  - name: Install required dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -yq --no-install-recommends fontforge unifont-bin

  - name: Download and verify Unifont v${{ inputs.unifont_version }}
    run: |
      # 原有验证代码保持不变
      ...

  - name: Extract and build Unifont BMP TTF (with SBIT support)
    run: |
      tar -xf unifont.tar.gz
      mv "unifont-${{ inputs.unifont_version }}" unifont
      cd unifont/font
      
      # 生成所有必要的 .hex 文件（包括 unifont_sample.hex）
      make hex
      
      # 将 unifont_sample.hex 转换为 BDF，供 ttf-stamp 使用
      hex2bdf -f "Unifont Sample" < compiled/unifont_sample-${{ inputs.unifont_version }}.hex > compiled/unifont_sample-${{ inputs.unifont_version }}.bdf
      
      # 现在执行完整的 TTF 构建（包括 SBIT 字体）
      make truetype
