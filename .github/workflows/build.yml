name: Build Unifont

permissions:
  actions: write

on:
  workflow_dispatch:
    inputs:
      unifont_version:
        description: 'The Unifont version to build (example: 15.1.01)'
        required: true
        type: string

jobs:
  build:
    name: Unifont TTF
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4

      - name: Install required dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq --no-install-recommends fontforge unifont-bin

      - name: Download and verify Unifont v${{ inputs.unifont_version }}
        run: |
          readonly BASE_URL='https://unifoundry.com/pub/unifont/unifont-${{ inputs.unifont_version }}'
          readonly SOURCE_TARBALL_NAME='unifont-${{ inputs.unifont_version }}.tar.gz'

          echo "> Fetching Unifont source tarball and its signature..."
          curl -o unifont.tar.gz "$BASE_URL/$SOURCE_TARBALL_NAME"
          curl -o unifont.tar.gz.sig "$BASE_URL/$SOURCE_TARBALL_NAME.sig"

          echo "> Asserting Unifont source tarball provenance..."
          gpg --batch --quick-generate-key --passphrase '' '41898282+github-actions[bot]@users.noreply.github.com'
          gpg --batch --import unifoundry-keys.gpg
          gpg --list-keys --with-colons | awk -F: '/^fpr:/ { print $10 }' | while read -r key_fingerprint; do
            gpg --batch --expert --quick-lsign "$key_fingerprint" || true
          done
          gpg --batch --verify unifont.tar.gz.sig unifont.tar.gz

      - name: Extract and build BMP and SMP TTF directly (skip SBIT)
        run: |
          tar -xf unifont.tar.gz
          mv "unifont-${{ inputs.unifont_version }}" unifont
          cd unifont/font

          # 生成所有 .hex 文件（包括 BMP 和 SMP 的 .hex）
          make hex

          # ----- 构建 BMP TTF (unifont) -----
          echo "Building BMP TTF..."
          # 从 compiled/unifont-*.hex 提取，移除变体选择器，加入版权符号
          grep -v "^FE0.:" compiled/unifont-${{ inputs.unifont_version }}.hex > ttfsrc/unifont.hex
          cat plane00/copyleft.hex >> ttfsrc/unifont.hex
          install -p plane00/plane00-combining.txt ttfsrc/combining.txt
          cd ttfsrc && \
            make FONTFILE="unifont" COMBINING="combining" \
                 FONTNAME="Unifont" PSNAME="Unifont"
          cd ..
          mv ttfsrc/unifont.sfd compiled/unifont-${{ inputs.unifont_version }}.sfd
          mv ttfsrc/unifont.ttf compiled/unifont-${{ inputs.unifont_version }}.ttf
          rm ttfsrc/unifont.hex ttfsrc/combining.txt

          # ----- 构建 SMP TTF (unifont_upper) -----
          echo "Building SMP TTF..."
          # 从 compiled/unifont_upper-*.hex 提取，移除变体选择器 U+E0100..U+E01EF
          grep -v "^0E01[0-E].:" compiled/unifont_upper-${{ inputs.unifont_version }}.hex > ttfsrc/unifont_upper.hex
          sort -u plane0[1-E]/*combining.txt > ttfsrc/combining_upper.txt
          cd ttfsrc && \
            make FONTFILE="unifont_upper" COMBINING="combining_upper" \
                 FONTNAME="Unifont Upper" PSNAME="UnifontUpper"
          cd ..
          mv ttfsrc/unifont_upper.sfd compiled/unifont_upper-${{ inputs.unifont_version }}.sfd
          mv ttfsrc/unifont_upper.ttf compiled/unifont_upper-${{ inputs.unifont_version }}.ttf
          rm ttfsrc/unifont_upper.hex ttfsrc/combining_upper.txt

      - name: Upload generated Unifont BMP TTF as artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: Unifont BMP TTF
          path: unifont/font/compiled/unifont-${{ inputs.unifont_version }}.ttf

      - name: Upload generated Unifont SMP TTF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unifont SMP TTF
          path: unifont/font/compiled/unifont_upper-${{ inputs.unifont_version }}.ttf
